<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0B0F14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>2Fly Client Portal - Login</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0B0F14;
      background-image: radial-gradient(ellipse 120% 80% at 50% -20%, #1a1f3d 0%, #0B0F14 60%);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      overflow: hidden;
      background: #0B0F14;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }

    /* Text mark on brand navy — matches app shell #0B0F14 (no embedded black PNG) */
    .login-logo-mark {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .login-logo-line1,
    .login-logo-line2 {
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .login-logo-line1 {
      color: #ffffff;
    }

    .login-logo-line2 {
      color: #5eb3ff;
      margin-top: 2px;
    }

    .login-title {
      font-size: 26px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 0;
    }

    .login-subtitle {
      font-size: 14px;
      color: #64748b;
      margin-top: 6px;
      line-height: 1.45;
    }

    .error-message {
      display: none;
      align-items: flex-start;
      gap: 8px;
      background: #fef2f2;
      color: #991b1b;
      border-left: 3px solid #dc2626;
      padding: 12px 14px;
      border-radius: 0 8px 8px 0;
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .error-message.show {
      display: flex;
    }

    .error-banner-icon {
      flex-shrink: 0;
      line-height: 1.2;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    .form-helper {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s, background-color 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: #1e40af;
    }

    .form-input:focus-visible {
      outline: 2px solid #1e40af;
      outline-offset: 2px;
    }

    .form-input.input-error {
      border-color: #dc2626;
      background: #fef2f2;
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap .form-input {
      padding-right: 48px;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      border-radius: 6px;
      color: #64748b;
    }

    .password-toggle:hover {
      color: #0f172a;
    }

    .password-toggle:focus-visible {
      outline: 2px solid #1e40af;
      outline-offset: 2px;
    }

    .forgot-row {
      text-align: right;
      margin-bottom: 16px;
      margin-top: -8px;
    }

    .forgot-link {
      font-size: 13px;
      color: #1e40af;
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .forgot-link:focus-visible {
      outline: 2px solid #1e40af;
      outline-offset: 2px;
      border-radius: 2px;
    }

    .btn {
      width: 100%;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: inherit;
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.75;
      transform: none;
      box-shadow: none;
    }

    .btn-primary {
      background: linear-gradient(180deg, #1e40af, #1a3690);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(180deg, #1a3690, #152e7a);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(30, 64, 175, 0.35);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-primary:focus-visible {
      outline: 2px solid #1e40af;
      outline-offset: 3px;
    }

    .btn-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .trust-line {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 16px;
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #64748b;
      line-height: 1.5;
    }

    .staff-link {
      display: block;
      margin-top: 8px;
      color: #1e40af;
      font-size: 12px;
      text-decoration: none;
    }

    .staff-link:hover {
      text-decoration: underline;
    }

    .staff-link:focus-visible {
      outline: 2px solid #1e40af;
      outline-offset: 2px;
      border-radius: 2px;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 28px 20px;
        border-radius: 16px;
        margin: 12px;
      }

      .login-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo" role="img" aria-label="2FlyFlow">
        <div class="login-logo-mark">
          <span class="login-logo-line1">2Fly</span>
          <span class="login-logo-line2">Flow</span>
        </div>
      </div>
      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Sign in to view your content, approvals, and updates</p>
    </div>

    <div id="errorMessage" class="error-message" role="alert" aria-live="polite" aria-atomic="true">
      <span class="error-banner-icon" aria-hidden="true">⚠</span>
      <span id="errorMessageText"></span>
    </div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="clientId">Client ID</label>
        <input
          type="text"
          class="form-input"
          id="clientId"
          name="username"
          placeholder="e.g. ardanspa"
          required
          autocomplete="username"
        />
        <span class="form-helper">The ID your agency gave you</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-wrap">
          <input
            type="password"
            class="form-input"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
          <button type="button" class="password-toggle" onclick="togglePassword()" aria-label="Show password" id="passwordToggleBtn">👁</button>
        </div>
      </div>

      <div class="forgot-row">
        <a href="/forgot-password" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary" aria-label="Sign in to your account">
        <span class="btn-label">Sign In</span>
      </button>
    </form>

    <div class="trust-line" role="note">🔒 Your data is encrypted and secure</div>

    <div class="login-footer">
      <p>Need access? Ask your agency team to invite you.</p>
      <a href="/staff-login" class="staff-link">Agency staff? Sign in here →</a>
    </div>
  </div>

  <script>
    const LS_SESSION_KEY = '2fly_client_session';
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:3003'
      : 'https://api.2flyflow.com';

    function hideError() {
      const errorEl = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorMessageText');
      errorEl.classList.remove('show');
      if (errorText) errorText.textContent = '';
    }

    function showError(message) {
      const errorEl = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorMessageText');
      if (errorText) errorText.textContent = message;
      errorEl.classList.add('show');
    }

    function clearFieldErrors() {
      document.querySelectorAll('.form-input.input-error').forEach(function (el) {
        el.classList.remove('input-error');
      });
    }

    function setSubmitLoading(loading) {
      const submitBtn = document.querySelector('.btn-primary');
      const label = submitBtn.querySelector('.btn-label');
      if (!submitBtn || !label) return;
      if (loading) {
        submitBtn.disabled = true;
        label.innerHTML = '<span class="btn-spinner" aria-hidden="true"></span> Signing in...';
      } else {
        submitBtn.disabled = false;
        label.textContent = 'Sign In';
      }
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.getElementById('passwordToggleBtn');
      if (!input || !btn) return;
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
        btn.setAttribute('aria-label', 'Hide password');
      } else {
        input.type = 'password';
        btn.textContent = '👁';
        btn.setAttribute('aria-label', 'Show password');
      }
    }

    async function login(clientId, password) {
      try {
        const r = await fetch(API_BASE + '/api/auth/client-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ clientId, password })
        });
        const data = await r.json();
        if (!r.ok) {
          showError(data.error || 'Invalid client ID or password. Please try again.');
          return false;
        }
        const session = {
          clientId: data.client.id,
          clientName: data.client.name,
          loggedInAt: Date.now(),
          token: data.token || null
        };
        localStorage.setItem(LS_SESSION_KEY, JSON.stringify(session));
        window.location.href = 'index.html';
        return true;
      } catch (err) {
        showError('Unable to reach server. Check your connection and try again.');
        return false;
      }
    }

    const session = localStorage.getItem(LS_SESSION_KEY);
    if (session) {
      try {
        const d = JSON.parse(session);
        if (Date.now() - d.loggedInAt < 24 * 60 * 60 * 1000) {
          window.location.href = 'index.html';
        }
      } catch (e) { /* continue to login */ }
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      hideError();
      clearFieldErrors();

      const clientIdEl = document.getElementById('clientId');
      const passwordEl = document.getElementById('password');
      const clientId = clientIdEl.value.trim();
      const password = passwordEl.value;

      if (!clientId || !password) {
        if (!clientId) clientIdEl.classList.add('input-error');
        if (!password) passwordEl.classList.add('input-error');
        showError('Please enter your client ID and password');
        return;
      }

      setSubmitLoading(true);
      const ok = await login(clientId, password);
      if (!ok) {
        setSubmitLoading(false);
      }
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
